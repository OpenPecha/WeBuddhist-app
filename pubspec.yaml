name: flutter_pecha
description: "A Buddhist app for learning, sharing, and living the teachings."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.9.3+105

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  airbridge_flutter_sdk: ^4.9.0 # check latest at pub.dev

  # Audio
  just_audio: ^0.9.36

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Tibetan calendar (date conversion) + calendar grid UI
  tibetan_calendar: ^2.0.0
  table_calendar: ^3.1.2

  # Routing
  go_router: ^15.1.1

  # HTML
  flutter_html: ^3.0.0
  html: ^0.15.6

  # Markdown
  flutter_markdown_plus: ^1.0.7

  # State management
  flutter_riverpod: ^2.6.1

  # Authentication
  auth0_flutter: ^1.9.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Logging
  logging: ^1.3.0

  # Networking
  http: ^1.3.0
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^10.3.1

  # Functional Programming
  fpdart: ^1.1.0

  # FQuery
  fquery: ^1.5.4-beta.2

  # Hooks
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1

  # Local notifications
  flutter_local_notifications: ^19.4.1

  # Timezone
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

  # Permissions
  permission_handler: ^12.0.1

  url_launcher: ^6.3.2

  # Audio service
  audio_service: ^0.18.18

  # Equatable
  equatable: ^2.0.7
  cached_network_image: ^3.4.1

  # Google fonts
  google_fonts: ^6.2.1

  # Hive
  hive_flutter: ^1.1.0

  # Icons
  font_awesome_flutter: ^11.0.0
  flutter_launcher_icons: ^0.14.3

  # Shared preferences
  shared_preferences: ^2.5.3
  share_plus: ^12.0.2
  app_links: ^6.4.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  scrollable_positioned_list: ^0.3.8
  youtube_player_flutter: ^9.1.1
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.1.2

  # Network connectivity
  connectivity_plus: ^6.1.1
  upgrader: ^13.5.0

  # WebView
  webview_flutter: ^4.10.0
  # QR code generation
  qr_flutter: ^4.1.0
  skeletonizer: ^2.1.2
  phosphor_flutter:
    git:
      url: https://github.com/subarnaPdl/phosphor_icons.git
      ref: 514f0a883571c4453dbd6ee3041d1dcba4fb8fc7

  # UUID generation
  uuid: ^4.5.1
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  # Required by Airbridge SDK for uninstall tracking (RemoteMessage at R8 minify time)
  firebase_messaging: ^16.4.1
  posthog_flutter: ^5.24.0
  package_info_plus: ^9.0.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/webuddhist_gold.png"
  min_sdk_android: 21

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/segment-bg/
    - assets/images/verse-bg/
    - assets/images/tag_cover/
    - assets/images/recitation_cover/
    - assets/fonts/
    - assets/audios/
    - assets/audios/routine.caf
    - assets/audios/routine.ogg
    - assets/images/moon/
    - .env.dev
    - .env.staging
    - .env.prod

  fonts:
    # Tibetan fonts
    - family: SambhotaUnicode
      fonts:
        - asset: assets/fonts/sambhotaunicodeweb.ttf
          style: normal
# To add assets to your application, add an assets section, like this:
# assets:
#   - images/a_dot_burr.jpeg
#   - images/a_dot_ham.jpeg

# An image asset can refer to one or more resolution-specific "variants", see
# https://flutter.dev/to/resolution-aware-images

# For details regarding adding assets from package dependencies, see
# https://flutter.dev/to/asset-from-package
