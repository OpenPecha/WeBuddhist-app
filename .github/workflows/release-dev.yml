name: 🧪 Release • Dev

# develop branch -> dev flavor -> TestFlight internal + Play internal track.

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

concurrency:
  group: release-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    uses: ./.github/workflows/build-android.yml
    with:
      flavor:             dev
      entrypoint:         lib/main_dev.dart
      airbridge_app_name: webuddhist
      play_package_name:  org.pecha.app.dev
      play_track:         internal
      environment:        development
      upload_to_store:    true
    secrets: inherit

  ios:
    uses: ./.github/workflows/build-ios.yml
    with:
      flavor:             dev
      entrypoint:         lib/main_dev.dart
      airbridge_app_name: webuddhist
      auth0_domain:       dev-vz6o17motc18g45h.us.auth0.com
      ios_bundle_id:      org.pecha.app.dev
      environment:        development
      upload_to_store:    true
    secrets: inherit
